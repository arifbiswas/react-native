<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folder Structure Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-6 text-center">Repository Folder Structure</h1>
    <ul id="file-list" class="bg-white shadow-md rounded p-4">Loading...</ul>
  </div>

  <script>
    async function fetchRepoContents() {
      const owner = 'arifbiswas'; // Replace with your GitHub username
      const repo = 'react-native'; // Replace with your repository name
      const branch = 'main'; // Replace with your default branch name

      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/`;
      const response = await fetch(apiUrl);

      if (!response.ok) {
        document.getElementById('file-list').innerHTML = 
          '<li class="text-red-500">Failed to load contents.</li>';
        return;
      }

      const contents = await response.json();
      renderFileList(contents);
    }

    function renderFileList(contents) {
      const list = document.getElementById('file-list');
      list.innerHTML = ''; // Clear the "Loading..." text

      contents.forEach(item => {
        const listItem = document.createElement('li');
        listItem.className = 'mb-2';

        const link = document.createElement('a');
        link.href = item.download_url || '#';
        link.target = '_blank';
        link.className = 
          'block p-3 rounded hover:bg-blue-100 text-blue-600 font-medium';

        link.innerText = item.type === 'dir' ? `📁 ${item.name}` : `📄 ${item.name}`;

        if (item.type === 'dir') {
          link.href = '#';
          link.onclick = (event) => {
            event.preventDefault();
            fetchSubdirectory(item.path);
          };
        }

        listItem.appendChild(link);
        list.appendChild(listItem);
      });
    }

    async function fetchSubdirectory(path) {
      const owner = 'arifbiswas';
      const repo = 'react-native';
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const response = await fetch(apiUrl);

      if (!response.ok) {
        alert('Failed to load directory contents.');
        return;
      }

      const contents = await response.json();
      renderFileList(contents);
    }

    fetchRepoContents();
  </script>

</body>
</html>
