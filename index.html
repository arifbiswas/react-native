<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repository Folder Structure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .file-icon { display: inline-flex; align-items: center; gap: 8px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; background: #1f1f1f; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
    .toolbar button { background: #0078d4; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
    .container { display: flex; gap: 10px; }
    .explorer, .viewer { flex: 1; background: #1e1e1e; padding: 10px; border-radius: 6px; overflow: auto; resize: horizontal; min-width: 200px; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

  <div class="container mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">Repository Folder Structure</h1>
    <div class="toolbar">
      <button onclick="goBack()">⬅ Back</button>
      <button onclick="goForward()">➡ Forward</button>
    </div>
    <div class="container">
      <ul id="file-list" class="explorer shadow-lg rounded p-4 text-gray-300">Loading...</ul>
      <iframe id="file-viewer" class="viewer hidden"></iframe>
    </div>
  </div>

  <script>
    let historyStack = [];
    let currentIndex = -1;

    async function fetchRepoContents(path = '') {
      const owner = 'arifbiswas';
      const repo = 'react-native';
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const response = await fetch(apiUrl);

      if (!response.ok) {
        document.getElementById('file-list').innerHTML = '<li class="text-red-400">Failed to load contents.</li>';
        return;
      }

      const contents = await response.json();
      renderFileList(contents, path);
      updateHistory(path);
    }

    function getFileIcon(fileName, fileType) {
      if (fileType === 'dir') return '<i class="file-icon" style="color: orange;"> 📁 </i>';
      if (fileName.endsWith('.js')) return '<i class="file-icon" style="color: yellow;"> 🟨 JS </i>';
      if (fileName.endsWith('.jsx')) return '<i class="file-icon" style="color: lightgreen;"> 🟩 JSX </i>';
      if (fileName.endsWith('.html')) return '<i class="file-icon" style="color: orangered;"> 🟥 HTML </i>';
      if (fileName.endsWith('.css')) return '<i class="file-icon" style="color: blue;"> 🟦 CSS </i>';
      if (fileName.endsWith('.md')) return '<i class="file-icon" style="color: white;"> 📄 </i>';
      return '<i class="file-icon"> 📄</i>';
    }

    function renderFileList(contents, path) {
      const list = document.getElementById('file-list');
      list.innerHTML = '';

      contents.forEach(item => {
        if (item.name.startsWith('.')) return;
        const listItem = document.createElement('li');
        listItem.className = 'mb-2';

        const link = document.createElement('a');
        link.href = '#';
        link.className = 'block p-3 rounded hover:bg-blue-600 bg-gray-700 text-white font-medium flex items-center';
        link.innerHTML = `${getFileIcon(item.name, item.type)} ${item.name}`;

        if (item.type === 'dir') {
          link.onclick = (event) => {
            event.preventDefault();
            fetchRepoContents(item.path);
          };
        } else {
          link.onclick = (event) => {
            event.preventDefault();
            openFileViewer(item.download_url);
          };
        }

        listItem.appendChild(link);
        list.appendChild(listItem);
      });
    }

    function updateHistory(path) {
      if (historyStack[currentIndex] !== path) {
        historyStack = historyStack.slice(0, currentIndex + 1);
        historyStack.push(path);
        currentIndex++;
      }
    }

    function goBack() {
      if (currentIndex > 0) {
        currentIndex--;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    function goForward() {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    function openFileViewer(url) {
      const viewer = document.getElementById('file-viewer');
      viewer.classList.remove('hidden');
      viewer.src = url;
    }

    fetchRepoContents();
  </script>

</body>
</html>
