<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Repository Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-tsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #424242;
      border-radius: 3px;
    }
    #file-content {
      tab-size: 2;
    }
    .line-numbers .line-numbers-rows {
      border-right: 1px solid #404040;
      padding-right: 10px;
    }
    .line-numbers .line-numbers-rows > span:before {
      color: #858585;
    }
    .token.comment,
    .token.prolog,
    .token.doctype,
    .token.cdata {
      color: #608b4e;
    }
    .token.punctuation {
      color: #d4d4d4;
    }
    .token.property,
    .token.tag,
    .token.boolean,
    .token.number,
    .token.constant,
    .token.symbol,
    .token.deleted {
      color: #569cd6;
    }
    .token.selector,
    .token.attr-name,
    .token.string,
    .token.char,
    .token.builtin,
    .token.inserted {
      color: #ce9178;
    }
    .token.operator,
    .token.entity,
    .token.url,
    .language-css .token.string,
    .style .token.string {
      color: #d4d4d4;
    }
    .token.atrule,
    .token.attr-value,
    .token.keyword {
      color: #c586c0;
    }
    .token.function,
    .token.class-name {
      color: #dcdcaa;
    }
    .token.regex,
    .token.important,
    .token.variable {
      color: #d16969;
    }
    .markdown-content h1 { font-size: 2em; font-weight: bold; margin: 1em 0; }
    .markdown-content h2 { font-size: 1.5em; font-weight: bold; margin: 0.83em 0; }
    .markdown-content h3 { font-size: 1.17em; font-weight: bold; margin: 1em 0; }
    .markdown-content p { margin: 1em 0; }
    .markdown-content ul { list-style-type: disc; margin: 1em 0; padding-left: 2em; }
    .markdown-content ol { list-style-type: decimal; margin: 1em 0; padding-left: 2em; }
    .markdown-content code:not(pre code) {
      background: #2d3748;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .markdown-content pre {
      background: #2d3748;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1em 0;
    }
    .markdown-content a {
      color: #60a5fa;
      text-decoration: none;
    }
    .markdown-content a:hover {
      text-decoration: underline;
    }
    .markdown-content blockquote {
      border-left: 4px solid #4a5568;
      margin: 1em 0;
      padding-left: 1em;
      color: #9ca3af;
    }
    .markdown-content img {
      max-width: 100%;
      border-radius: 6px;
      margin: 1em 0;
    }
    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }
    .markdown-content th,
    .markdown-content td {
      border: 1px solid #4a5568;
      padding: 0.5em;
      text-align: left;
    }
    .markdown-content th {
      background: #2d3748;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 flex flex-col">
      <!-- Repository Info -->
      <div class="p-4 bg-gray-700">
        <h1 class="text-xl font-bold text-blue-400">Repository Explorer</h1>
        <p class="text-sm text-gray-400">arifbiswas/react-native</p>
      </div>
      <!-- Navigation -->
      <nav class="p-4 border-b border-gray-700">
        <button id="backBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-l-md hover:bg-gray-600 focus:outline-none">
          <i class="ri-arrow-left-line"></i>
        </button>
        <button id="forwardBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-r-md hover:bg-gray-600 focus:outline-none">
          <i class="ri-arrow-right-line"></i>
        </button>
      </nav>
      <!-- File List -->
      <div class="flex-grow overflow-y-auto custom-scrollbar">
        <ul id="file-list" class="p-2 text-gray-300">Loading...</ul>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col">
      <!-- Breadcrumb and File Info -->
      <div class="flex justify-between items-center p-4 bg-gray-800 text-sm text-gray-400">
        <div id="breadcrumb"></div>
        <div id="file-info"></div>
      </div>
      <!-- File Viewer -->
      <div class="flex-grow bg-[#1e1e1e] overflow-auto custom-scrollbar">
        <pre id="file-content" class="p-4 font-mono text-sm line-numbers"><code></code></pre>
      </div>
    </div>
  </div>

  <script>
    let historyStack = [];
    let currentIndex = -1;
    let currentPath = '';
    let isAuthenticated = false;
    let hasPushAccess = false;

    async function fetchRepoContents(path = '') {
      const owner = 'arifbiswas';
      const repo = 'react-native';
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      
      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('Failed to fetch contents');
        
        const contents = await response.json();
        renderFileList(contents, path);
        updateHistory(path);
        updateBreadcrumb(path);
        currentPath = path;
      } catch (error) {
        document.getElementById('file-list').innerHTML = 
          `<li class="text-red-400 p-2">Failed to load contents: ${error.message}</li>`;
      }
    }

    async function fetchFileContent(url) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Failed to fetch file content');
        
        const content = await response.json();
        const decodedContent = atob(content.content);
        return decodedContent;
      } catch (error) {
        throw new Error(`Failed to load file content: ${error.message}`);
      }
    }

    function getFileIcon(fileName, fileType) {
      if (fileType === 'dir') return '<i class="ri-folder-line text-yellow-500"></i>';
      if (fileName.endsWith('.js')) return '<i class="ri-javascript-line text-yellow-400"></i>';
      if (fileName.endsWith('.jsx')) return '<i class="ri-reactjs-line text-blue-400"></i>';
      if (fileName.endsWith('.html')) return '<i class="ri-html5-line text-red-500"></i>';
      if (fileName.endsWith('.css')) return '<i class="ri-css3-line text-blue-500"></i>';
      if (fileName.endsWith('.md')) return '<i class="ri-markdown-line text-white"></i>';
      return '<i class="ri-file-line text-gray-400"></i>';
    }

    function getLanguageFromFileName(fileName) {
      const extensions = {
        '.js': 'javascript',
        '.jsx': 'jsx',
        '.ts': 'typescript',
        '.tsx': 'tsx',
        '.html': 'html',
        '.css': 'css',
        '.md': 'markdown',
        '.json': 'json',
        '.py': 'python',
        '.rb': 'ruby',
        '.php': 'php',
        '.java': 'java',
        '.cpp': 'cpp',
        '.go': 'go',
        '.rs': 'rust',
        '.swift': 'swift',
        '.kt': 'kotlin',
      };
      const ext = Object.keys(extensions).find(ext => fileName.toLowerCase().endsWith(ext));
      return ext ? extensions[ext] : 'plaintext';
    }

    function renderFileList(contents, path) {
      const list = document.getElementById('file-list');
      list.innerHTML = '';

      contents.forEach(item => {
        if (item.name.startsWith('.')) return;
        const listItem = document.createElement('li');
        listItem.className = 'mb-1 flex items-center justify-between';

        const link = document.createElement('a');
        link.href = '#';
        link.className = 'flex items-center p-2 rounded hover:bg-gray-700 transition-colors duration-150';
        link.innerHTML = `${getFileIcon(item.name, item.type)} <span class="ml-2">${item.name}</span>`;

        if (item.type === 'dir') {
          link.onclick = (event) => {
            event.preventDefault();
            fetchRepoContents(item.path);
          };
        } else {
          link.onclick = async (event) => {
            event.preventDefault();
            try {
              const content = await fetchFileContent(item.url);
              displayFileContent(content, item.name);
            } catch (error) {
              displayFileContent(`Error: ${error.message}`, item.name);
            }
          };
        }

        listItem.appendChild(link);

        if (isAuthenticated && hasPushAccess) {
          const removeButton = document.createElement('button');
          removeButton.className = 'text-red-500 hover:text-red-700';
          removeButton.innerHTML = '<i class="ri-delete-bin-line"></i>';
          removeButton.onclick = () => removeItem(item.path, item.type);
          listItem.appendChild(removeButton);
        }

        list.appendChild(listItem);
      });
    }

    async function removeItem(path, type) {
      if (confirm(`Are you sure you want to remove this ${type}?`)) {
        try {
          // In a real application, you would make an API call to GitHub here
          // For this example, we'll just simulate the removal
          console.log(`Removing ${type}: ${path}`);
          await fetchRepoContents(currentPath);
        } catch (error) {
          alert(`Failed to remove ${type}: ${error.message}`);
        }
      }
    }

    function isReadmeFile(fileName) {
      return fileName.toLowerCase().includes('readme');
    }

    function displayFileContent(content, fileName) {
      const fileContent = document.getElementById('file-content');
      const fileInfo = document.getElementById('file-info');
      const language = getLanguageFromFileName(fileName);
      
      if (isReadmeFile(fileName)) {
        fileContent.innerHTML = `
          <code class="language-markdown markdown-content">
            ${marked.parse(content)}
          </code>
        `;
        fileContent.classList.remove('line-numbers');
      } else {
        fileContent.innerHTML = `<code class="language-${language}">${escapeHtml(content)}</code>`;
        fileContent.classList.add('line-numbers');
      }
      
      Prism.highlightElement(fileContent.querySelector('code'));
      fileInfo.textContent = `${fileName} | ${content.length} bytes`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateHistory(path) {
      if (historyStack[currentIndex] !== path) {
        historyStack = historyStack.slice(0, currentIndex + 1);
        historyStack.push(path);
        currentIndex++;
      }
      updateNavigationButtons();
    }

    function updateNavigationButtons() {
      document.getElementById('backBtn').disabled = currentIndex <= 0;
      document.getElementById('forwardBtn').disabled = currentIndex >= historyStack.length - 1;
    }

    function updateBreadcrumb(path) {
      const breadcrumb = document.getElementById('breadcrumb');
      const parts = path.split('/');
      let currentPath = '';
      breadcrumb.innerHTML = '<a href="#" class="hover:text-blue-400" onclick="fetchRepoContents(\'\')">root</a>';
      
      parts.forEach((part, index) => {
        if (part) {
          currentPath += part + '/';
          breadcrumb.innerHTML += ` / <a href="#" class="hover:text-
          currentPath += part + '/';
          breadcrumb.innerHTML += ` / <a href="#" class="hover:text-blue-400" onclick="fetchRepoContents('${currentPath}')">${part}</a>`;
        }
      });
    }

    function goBack() {
      if (currentIndex > 0) {
        currentIndex--;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    function goForward() {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('forwardBtn').addEventListener('click', goForward);

    // Simulating authentication and push access
    function simulateAuth() {
      isAuthenticated = true;
      hasPushAccess = true;
      fetchRepoContents(currentPath);
    }

    fetchRepoContents();

    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false,
      sanitize: false,
      silent: true
    });
  </script>
</body>
</html>
