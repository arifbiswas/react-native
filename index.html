<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Repository Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #2d3748;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #4a5568;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 flex flex-col">
      <!-- Repository Info -->
      <div class="p-4 bg-gray-700">
        <h1 class="text-xl font-bold text-blue-400">Repository Explorer</h1>
        <p class="text-sm text-gray-400">arifbiswas/react-native</p>
      </div>
      <!-- Navigation -->
      <nav class="p-4 border-b border-gray-700">
        <button id="backBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-l-md hover:bg-gray-600 focus:outline-none">
          <i class="ri-arrow-left-line"></i>
        </button>
        <button id="forwardBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-r-md hover:bg-gray-600 focus:outline-none">
          <i class="ri-arrow-right-line"></i>
        </button>
      </nav>
      <!-- File List -->
      <div class="flex-grow overflow-y-auto custom-scrollbar">
        <ul id="file-list" class="p-2 text-gray-300">Loading...</ul>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col">
      <!-- Breadcrumb -->
      <div id="breadcrumb" class="p-4 bg-gray-800 text-sm text-gray-400"></div>
      <!-- File Viewer -->
      <div class="flex-grow bg-gray-900 p-4">
        <iframe id="file-viewer" class="w-full h-full bg-white rounded-lg shadow-lg"></iframe>
      </div>
    </div>
  </div>

  <script>
    let historyStack = [];
    let currentIndex = -1;

    async function fetchRepoContents(path = '') {
      const owner = 'arifbiswas';
      const repo = 'react-native';
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const response = await fetch(apiUrl);

      if (!response.ok) {
        document.getElementById('file-list').innerHTML = '<li class="text-red-400">Failed to load contents.</li>';
        return;
      }

      const contents = await response.json();
      renderFileList(contents, path);
      updateHistory(path);
      updateBreadcrumb(path);
    }

    function getFileIcon(fileName, fileType) {
      if (fileType === 'dir') return '<i class="ri-folder-line text-yellow-500"></i>';
      if (fileName.endsWith('.js')) return '<i class="ri-javascript-line text-yellow-400"></i>';
      if (fileName.endsWith('.jsx')) return '<i class="ri-reactjs-line text-blue-400"></i>';
      if (fileName.endsWith('.html')) return '<i class="ri-html5-line text-red-500"></i>';
      if (fileName.endsWith('.css')) return '<i class="ri-css3-line text-blue-500"></i>';
      if (fileName.endsWith('.md')) return '<i class="ri-markdown-line text-white"></i>';
      return '<i class="ri-file-line text-gray-400"></i>';
    }

    function renderFileList(contents, path) {
      const list = document.getElementById('file-list');
      list.innerHTML = '';

      contents.forEach(item => {
        if (item.name.startsWith('.')) return;
        const listItem = document.createElement('li');
        listItem.className = 'mb-1';

        const link = document.createElement('a');
        link.href = '#';
        link.className = 'flex items-center p-2 rounded hover:bg-gray-700 transition-colors duration-150';
        link.innerHTML = `${getFileIcon(item.name, item.type)} <span class="ml-2">${item.name}</span>`;

        if (item.type === 'dir') {
          link.onclick = (event) => {
            event.preventDefault();
            fetchRepoContents(item.path);
          };
        } else {
          link.onclick = (event) => {
            event.preventDefault();
            openFileViewer(item.download_url);
          };
        }

        listItem.appendChild(link);
        list.appendChild(listItem);
      });
    }

    function updateHistory(path) {
      if (historyStack[currentIndex] !== path) {
        historyStack = historyStack.slice(0, currentIndex + 1);
        historyStack.push(path);
        currentIndex++;
      }
      updateNavigationButtons();
    }

    function updateNavigationButtons() {
      document.getElementById('backBtn').disabled = currentIndex <= 0;
      document.getElementById('forwardBtn').disabled = currentIndex >= historyStack.length - 1;
    }

    function updateBreadcrumb(path) {
      const breadcrumb = document.getElementById('breadcrumb');
      const parts = path.split('/');
      let currentPath = '';
      breadcrumb.innerHTML = '<a href="#" class="hover:text-blue-400" onclick="fetchRepoContents(\'\')">root</a>';
      
      parts.forEach((part, index) => {
        if (part) {
          currentPath += part + '/';
          breadcrumb.innerHTML += ` / <a href="#" class="hover:text-blue-400" onclick="fetchRepoContents('${currentPath}')">${part}</a>`;
        }
      });
    }

    function goBack() {
      if (currentIndex > 0) {
        currentIndex--;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    function goForward() {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    function openFileViewer(url) {
      const viewer = document.getElementById('file-viewer');
      viewer.src = url;
    }

    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('forwardBtn').addEventListener('click', goForward);

    fetchRepoContents();
  </script>
</body>
</html>
