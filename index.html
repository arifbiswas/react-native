<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Repository Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@octokit/rest@19.0.7/dist/index.umd.min.js"></script>
  <style>
    /* ... (previous styles remain unchanged) ... */
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 flex flex-col">
      <!-- Repository Info -->
      <div class="p-4 bg-gray-700">
        <h1 class="text-xl font-bold text-blue-400">Repository Explorer</h1>
        <p class="text-sm text-gray-400">arifbiswas/react-native</p>
      </div>
      <!-- Navigation -->
      <nav class="p-4 border-b border-gray-700">
        <button id="backBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-l-md hover:bg-gray-600 focus:outline-none">
          <i class="ri-arrow-left-line"></i>
        </button>
        <button id="forwardBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-r-md hover:bg-gray-600 focus:outline-none">
          <i class="ri-arrow-right-line"></i>
        </button>
        <button id="authBtn" class="px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none ml-2">
          Auth
        </button>
      </nav>
      <!-- File List -->
      <div class="flex-grow overflow-y-auto custom-scrollbar">
        <ul id="file-list" class="p-2 text-gray-300">Loading...</ul>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col">
      <!-- Breadcrumb and File Info -->
      <div class="flex justify-between items-center p-4 bg-gray-800 text-sm text-gray-400">
        <div id="breadcrumb"></div>
        <div id="file-info"></div>
      </div>
      <!-- File Viewer -->
      <div class="flex-grow bg-[#1e1e1e] overflow-auto custom-scrollbar">
        <pre id="file-content" class="p-4 font-mono text-sm"><code></code></pre>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="createFolderModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg">
      <h2 class="text-xl mb-4">Create New Folder</h2>
      <input type="text" id="newFolderName" class="w-full p-2 mb-4 bg-gray-700 text-white rounded" placeholder="Folder name">
      <div class="flex justify-end">
        <button id="cancelCreateFolder" class="px-4 py-2 bg-gray-600 text-white rounded mr-2">Cancel</button>
        <button id="confirmCreateFolder" class="px-4 py-2 bg-blue-600 text-white rounded">Create</button>
      </div>
    </div>
  </div>

  <div id="editFileModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg w-3/4 h-3/4 flex flex-col">
      <h2 class="text-xl mb-4">Edit File</h2>
      <textarea id="fileContent" class="flex-grow p-2 mb-4 bg-gray-700 text-white rounded"></textarea>
      <div class="flex justify-end">
        <button id="cancelEditFile" class="px-4 py-2 bg-gray-600 text-white rounded mr-2">Cancel</button>
        <button id="confirmEditFile" class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
      </div>
    </div>
  </div>

  <script>
    const owner = 'arifbiswas';
    const repo = 'react-native';
    let octokit;
    let historyStack = [];
    let currentIndex = -1;
    let currentPath = '';
    let isAuthenticated = false;
    let isOwner = false;

    async function initializeOctokit(token) {
      octokit = new Octokit.Octokit({ auth: token });
      const { data: user } = await octokit.rest.users.getAuthenticated();
      isOwner = user.login === owner;
    }

    async function fetchRepoContents(path = '') {
      try {
        const { data } = await octokit.rest.repos.getContent({
          owner,
          repo,
          path,
        });
        renderFileList(Array.isArray(data) ? data : [data], path);
        updateHistory(path);
        updateBreadcrumb(path);
        currentPath = path;
      } catch (error) {
        document.getElementById('file-list').innerHTML = 
          `<li class="text-red-400 p-2">Failed to load contents: ${error.message}</li>`;
      }
    }

    async function fetchFileContent(path) {
      try {
        const { data } = await octokit.rest.repos.getContent({
          owner,
          repo,
          path,
        });
        return atob(data.content);
      } catch (error) {
        throw new Error(`Failed to load file content: ${error.message}`);
      }
    }

    function getFileIcon(fileName, type) {
      if (type === 'dir') return '<i class="ri-folder-line text-yellow-500"></i>';
      if (fileName.endsWith('.js')) return '<i class="ri-javascript-line text-yellow-400"></i>';
      if (fileName.endsWith('.jsx')) return '<i class="ri-reactjs-line text-blue-400"></i>';
      if (fileName.endsWith('.html')) return '<i class="ri-html5-line text-red-500"></i>';
      if (fileName.endsWith('.css')) return '<i class="ri-css3-line text-blue-500"></i>';
      if (fileName.endsWith('.md')) return '<i class="ri-markdown-line text-white"></i>';
      return '<i class="ri-file-line text-gray-400"></i>';
    }

    function getLanguageFromFileName(fileName) {
      const extensions = {
        '.js': 'javascript',
        '.jsx': 'jsx',
        '.ts': 'typescript',
        '.tsx': 'tsx',
        '.html': 'html',
        '.css': 'css',
        '.md': 'markdown',
        '.json': 'json',
      };
      const ext = Object.keys(extensions).find(ext => fileName.toLowerCase().endsWith(ext));
      return ext ? extensions[ext] : 'plaintext';
    }

    function renderFileList(contents, path) {
      const list = document.getElementById('file-list');
      list.innerHTML = '';

      if (isAuthenticated) {
        const createFolderItem = document.createElement('li');
        createFolderItem.className = 'mb-1';
        createFolderItem.innerHTML = `
          <button class="flex items-center p-2 rounded hover:bg-gray-700 transition-colors duration-150 w-full">
            <i class="ri-add-line text-green-500"></i>
            <span class="ml-2">Create New Folder</span>
          </button>
        `;
        createFolderItem.onclick = () => showCreateFolderModal();
        list.appendChild(createFolderItem);
      }

      contents.forEach(item => {
        if (item.name.startsWith('.')) return;
        const listItem = document.createElement('li');
        listItem.className = 'mb-1 flex items-center justify-between';

        const link = document.createElement('a');
        link.href = '#';
        link.className = 'flex items-center p-2 rounded hover:bg-gray-700 transition-colors duration-150';
        link.innerHTML = `${getFileIcon(item.name, item.type)} <span class="ml-2">${item.name}</span>`;

        if (item.type === 'dir') {
          link.onclick = (event) => {
            event.preventDefault();
            fetchRepoContents(item.path);
          };
        } else {
          link.onclick = async (event) => {
            event.preventDefault();
            try {
              const content = await fetchFileContent(item.path);
              displayFileContent(content, item.name);
            } catch (error) {
              displayFileContent(`Error: ${error.message}`, item.name);
            }
          };
        }

        listItem.appendChild(link);

        if (isAuthenticated) {
          const actionsDiv = document.createElement('div');
          
          if (item.type !== 'dir') {
            const editButton = document.createElement('button');
            editButton.className = 'text-blue-500 hover:text-blue-700 p-2';
            editButton.innerHTML = '<i class="ri-edit-line"></i>';
            editButton.onclick = () => showEditFileModal(item.path);
            actionsDiv.appendChild(editButton);
          }

          if (isOwner) {
            const deleteButton = document.createElement('button');
            deleteButton.className = 'text-red-500 hover:text-red-700 p-2';
            deleteButton.innerHTML = '<i class="ri-delete-bin-line"></i>';
            deleteButton.onclick = () => deleteItem(item.path, item.type);
            actionsDiv.appendChild(deleteButton);
          }

          listItem.appendChild(actionsDiv);
        }

        list.appendChild(listItem);
      });
    }

    async function deleteItem(path, type) {
      if (confirm(`Are you sure you want to delete this ${type}?`)) {
        try {
          await octokit.rest.repos.deleteFile({
            owner,
            repo,
            path,
            message: `Delete ${path}`,
            sha: await getFileSha(path),
          });
          await fetchRepoContents(currentPath);
        } catch (error) {
          alert(`Failed to delete ${type}: ${error.message}`);
        }
      }
    }

    async function getFileSha(path) {
      const { data } = await octokit.rest.repos.getContent({
        owner,
        repo,
        path,
      });
      return data.sha;
    }

    function showCreateFolderModal() {
      document.getElementById('createFolderModal').style.display = 'flex';
    }

    function hideCreateFolderModal() {
      document.getElementById('createFolderModal').style.display = 'none';
      document.getElementById('newFolderName').value = '';
    }

    async function createFolder() {
      const folderName = document.getElementById('newFolderName').value.trim();
      if (folderName) {
        try {
          await octokit.rest.repos.createOrUpdateFileContents({
            owner,
            repo,
            path: `${currentPath}${folderName}/.gitkeep`,
            message: `Create folder ${folderName}`,
            content: btoa(''),
          });
          hideCreateFolderModal();
          await fetchRepoContents(currentPath);
        } catch (error) {
          alert(`Failed to create folder: ${error.message}`);
        }
      }
    }

    function showEditFileModal(path) {
      document.getElementById('editFileModal').style.display = 'flex';
      fetchFileContent(path).then(content => {
        document.getElementById('fileContent').value = content;
      });
    }

    function hideEditFileModal() {
      document.getElementById('editFileModal').style.display = 'none';
      document.getElementById('fileContent').value = '';
    }

    async function saveFile() {
      const content = document.getElementById('fileContent').value;
      try {
        await octokit.rest.repos.createOrUpdateFileContents({
          owner,
          repo,
          path: currentPath,
          message: `Update ${currentPath}`,
          content: btoa(content),
          sha: await getFileSha(currentPath),
        });
        hideEditFileModal();
        await fetchRepoContents(currentPath.split('/').slice(0, -1).join('/'));
      } catch (error) {
        alert(`Failed to save file: ${error.message}`);
      }
    }

    function isReadmeFile(fileName) {
      return fileName.toLowerCase().includes('readme');
    }

    function displayFileContent(content, fileName) {
      const fileContent = document.getElementById('file-content');
      const fileInfo = document.getElementById('file-info');
      const language = getLanguageFromFileName(fileName);
      
      if (isReadmeFile(fileName)) {
        fileContent.innerHTML = `
          <code class="language-markdown markdown-content">
            ${marked.parse(content)}
          </code>
        `;
        fileContent.classList.remove('line-numbers');
      } else {
        fileContent.innerHTML = `<code class="language-${language}">${escapeHtml(content)}</code>`;
        fileContent.classList.add('line-numbers');
      }
      
      Prism.highlightElement(fileContent.querySelector('code'));
      fileInfo.textContent = `${fileName} | ${content.length} bytes`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateHistory(path) {
      if (historyStack[currentIndex] !== path) {
        historyStack = historyStack.slice(0, currentIndex + 1);
        historyStack.push(path);
        currentIndex++;
      }
      updateNavigationButtons();
    }

    function updateNavigationButtons() {
      document.getElementById('backBtn').disabled = currentIndex <= 0;
      document.getElementById('forwardBtn').disabled = currentIndex >= historyStack.length - 1;
    }

    function updateBreadcrumb(path) {
      const breadcrumb = document.getElementById('breadcrumb');
      const parts = path.split('/');
      let currentPath = '';
      breadcrumb.innerHTML = '<a href="#" class="hover:text-blue-400" onclick="fetchRepoContents(\'\')">root</a>';
      
      parts.forEach((part, index) => {
        if (part) {
          currentPath += part + '/';
          breadcrumb.innerHTML += ` / <a href="#" class="hover:text-blue-400" onclick="fetchRepoContents('${currentPath}')">${part}</a>`;
        }
      });
    }

    function goBack() {
      if (currentIndex > 0) {
        currentIndex--;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    function goForward() {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        fetchRepoContents(historyStack[currentIndex]);
      }
    }

    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('forwardBtn').addEventListener('click', goForward);

    // Authentication
    async function authenticate() {
      const token = prompt("Enter your GitHub Personal Access Token:");
      if (token) {
        try {
          await initializeOctokit(token);
          isAuthenticated = true;
          document.getElementById('authBtn').textContent = 'Logout';
          fetchRepoContents(currentPath);
        } catch (error) {
          alert(`Authentication failed: ${error.message}`);
        }
      }
    }

    function logout() {
      isAuthenticated = false;
      isOwner = false;
      octokit = null;
      document.getElementById('authBtn').textContent = 'Auth';
      fetchRepoContents(currentPath);
    }

    document.getElementById('authBtn').addEventListener('click', () => {
      if (isAuthenticated) {
        logout();
      } else {
        authenticate();
      }
    });

    document.getElementById('confirmCreateFolder').addEventListener('click', createFolder);
    document.getElementById('cancelCreateFolder').addEventListener('click', hideCreateFolderModal);
    document.getElementById('confirmEditFile').addEventListener('click', saveFile);
    document.getElementById('cancelEditFile').addEventListener('click', hideEditFileModal);

    fetchRepoContents();

    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false,
      sanitize: false,
      silent: true
    });
  </script>
</body>
</html>
