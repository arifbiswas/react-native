<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Directory Listing</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
  <header class="p-5 bg-blue-600 text-white text-center">
    <h1 class="text-2xl">Directory Listing</h1>
    <p class="mt-2">Auto-updated list of all files and folders in this repository</p>
  </header>

  <main class="container mx-auto mt-6">
    <ul id="file-list" class="bg-white shadow-md rounded-lg p-6">
      <li class="text-blue-600">Loading...</li>
    </ul>
  </main>

  <footer class="mt-10 p-5 text-center bg-blue-600 text-white">
    <p>&copy; 2025 Your Repository - Powered by GitHub Pages</p>
  </footer>

  <script>
    // Replace these with your repository details
    const owner = "arifbiswas";
    const repo = "react-native";

    async function fetchFiles() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents`;
      const response = await fetch(apiUrl);

      if (!response.ok) {
        document.getElementById("file-list").innerHTML = "<li>Error loading files</li>";
        return;
      }

      const files = await response.json();
      const fileList = document.getElementById("file-list");

      fileList.innerHTML = ""; // Clear loading message

      files.forEach(file => {
        const listItem = document.createElement("li");
        listItem.className = "p-2 border-b last:border-none";

        if (file.type === "dir") {
          listItem.innerHTML = `<a href="${file.html_url}" target="_blank" class="text-blue-600 hover:underline">${file.name}/</a>`;
        } else {
          listItem.innerHTML = `<a href="${file.download_url}" target="_blank" class="text-blue-600 hover:underline">${file.name}</a>`;
        }

        fileList.appendChild(listItem);
      });
    }

    fetchFiles();
  </script>
</body>
</html>
